<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoBot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Floating Button (Initial State) -->
    <div class="chatbot-toggle" id="chatbot-toggle" aria-label="Open chatbot">
        <div class="robot-head">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Head -->
                <rect x="15" y="20" width="70" height="65" rx="8" fill="currentColor" />
                <!-- Left Eye -->
                <rect x="28" y="32" width="14" height="14" rx="2" fill="white" />
                <circle cx="35" cy="39" r="4" fill="#6B2FA9" />
                <!-- Right Eye -->
                <rect x="58" y="32" width="14" height="14" rx="2" fill="white" />
                <circle cx="65" cy="39" r="4" fill="#6B2FA9" />
                <!-- Mouth -->
                <path d="M 35 55 Q 50 65 65 55" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
            </svg>
        </div>
    </div>

    <!-- Main Chatbot Container -->
    <div class="chat-wrapper" id="chat-wrapper">
        <section class="chat-container">

            <div class="chat-header">
                <div class="header-content">
                    <h1>TechnoBot</h1>
                </div>
                <div class="close-button" id="close-button" aria-label="Close chatbot">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </div>
            </div>

            <div class="chat-box" id="chat-box">
                <div class="bot-message">
                    <div class="message-content">Hallo! Ik ben TechnoBot. Hoe kan ik je helpen?</div>
                </div>
            </div>

            <div class="chat-input-wrapper">
                <div class="chat-input">
                    <input type="text" id="user-input" placeholder="Stel een vraag..." />
                    <button id="send-btn" aria-label="Bericht verzenden">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

        </section>
    </div>

    <script src="script.js"></script>

</body>

</html>
