<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoBot</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="chat-container">

    <article class="chat-header">
        <h1>TechnoBot</h1>
    </article>

    <article class="chat-box" id="chat-box">
        <article class="bot-message">
            Hey 👋 Ik ben TechnoBot! Stel me een vraag.
        </article>
    </article>

    <article class="chat-input">
        <input type="text" id="user-input" placeholder="Typ een bericht...">
        <button id="send-btn">Verstuur</button>
    </article>

</section>

<script src="script.js"></script>

</body>
</html>
